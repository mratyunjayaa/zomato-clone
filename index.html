<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zomato</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon">
</head>

<body>
    <nav class="navbar">

        <div class="logo">
            <img src="images/zomoto.png" alt="Zomato Logo">
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search restaurant or location...">

            <button id="searchBtn">
                🔍
            </button>
        </div>

        <div class="nav-links">
            <button>Login</button>
            <button>Sign Up</button>
        </div>

    </nav>


    <div id="head">
        <button id="Filters">Filters</button>
        <button id="Offers">Offers</button>
        <button id="Rating">Rating ⭐ 4.5+</button>
        <button id="Alcohol">Serves Alcohol</button>
        <button id="Open">Open Now</button>
    </div>

    <div id="overlay" class="hidden"></div>
    <div id="filterPopup" class="hidden">

        <h3>Choose Filter</h3>

        <div class="filterOption">
            <input type="radio" id="sortByRating" name="filterOption" value="rating">
            <label for="sortByRating">
                Sort by Rating
            </label>
        </div>

        <div class="filterOption">
            <input type="radio" id="sortHighToLow" name="filterOption" value="highToLow">
            <label for="sortHighToLow">
                High to Low (Price)
            </label>
        </div>

        <div class="filterOption">
            <input type="radio" id="costOption" name="filterOption" value="lowToHigh">
            <label for="costOption">
                Cost: Low to High
            </label>
        </div>

        <div class="filterOption">
            <input type="radio" id="distanceOption" name="filterOption" value="distance">
            <label for="distanceOption">
                Nearest First
            </label>
        </div>

        <div class="filterOption">
            <input type="radio" id="offersOption" name="filterOption" value="offers">
            <label for="offersOption">
                Best Offers
            </label>
        </div>

        <button id="applyFilter">
            Apply Filter
        </button>


    </div>

    <div id="root"></div>

    <footer id="footer">

    <div class="footer-content">

        <h3>Made with ❤️ by TomaR</h3>

        <p>
            © 2026 All Rights Reserved
        </p>

        <div class="footer-links">

            <a href="mailto:tomarvishal@zohomail.in">
                📧 Contact
            </a>

            <a href="https://www.linkedin.com/in/vishaltomar13" target="_blank">
                💼 LinkedIn
            </a>

        </div>

    </div>

</footer>

    <script src="script.js"></script>
</body>

</html>
